<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gigaverse — Jogadores</title>
</head>
<body>
  <h1>Jogadores do Gigaverse</h1>

  <form id="form-cadastro">
    <label for="nome">Nome</label>
    <input id="nome" name="nome" type="text" />
    <button type="submit">Adicionar</button>
  </form>

  <ul id="lista" aria-label="lista de jogadores"></ul>

  <script>
    // Página simples e autocontida (sem backend) para os testes E2E exercitarem
    // formulário + lista. No Módulo E2E o Playwright preenche o campo e confere a lista.
    const form = document.getElementById('form-cadastro');
    const lista = document.getElementById('lista');

    form.addEventListener('submit', (evento) => {
      evento.preventDefault();
      const nome = document.getElementById('nome').value.trim();
      if (!nome) return;
      const item = document.createElement('li');
      item.textContent = nome;
      lista.appendChild(item);
      form.reset();
      document.getElementById('nome').focus();
    });
  </script>
</body>
</html>
